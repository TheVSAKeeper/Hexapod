name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - master

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      should_release: ${{ steps.decide.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oP '(?<=<Version>).*(?=</Version>)' Directory.Build.props)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create tag if needed
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          if ! git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.VERSION }}" | grep -q .; then
            git tag "v${{ steps.version.outputs.VERSION }}"
            git push origin "v${{ steps.version.outputs.VERSION }}"
          fi

      - name: Decide if release is needed
        id: decide
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif ! gh release view "v${{ steps.version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (framework-dependent)
        run: >
          dotnet publish Hexapod/Hexapod/Hexapod.csproj
          --configuration Release
          --runtime win-x64
          --output .\publish\framework-dependent
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -p:Version=${{ needs.prepare.outputs.version }}
          --no-self-contained

      - name: Publish (portable / self-contained)
        run: >
          dotnet publish Hexapod/Hexapod/Hexapod.csproj
          --configuration Release
          --runtime win-x64
          --output .\publish\portable
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ needs.prepare.outputs.version }}
          --self-contained

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $version = "${{ needs.prepare.outputs.version }}"

          Move-Item ".\publish\framework-dependent\Hexapod.exe" ".\dist\Hexapod-v$version.exe"
          Compress-Archive -Path ".\dist\Hexapod-v$version.exe" -DestinationPath ".\dist\Hexapod-v$version.zip"

          Move-Item ".\publish\portable\Hexapod.exe" ".\publish\portable\Hexapod-v$version-portable.exe"
          Compress-Archive -Path ".\publish\portable\Hexapod-v$version-portable.exe" -DestinationPath ".\dist\Hexapod-v$version-portable.zip"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Hexapod
          path: dist/*
          retention-days: 1

  publish:
    needs: [prepare, build]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Render release body
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          REPO="${{ github.server_url }}/${{ github.repository }}"
          SLUG="${{ github.repository }}"
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)

          {
            sed -e "s|__VERSION__|$VERSION|g" -e "s|__REPO__|$REPO|g" -e "s|__SLUG__|$SLUG|g" .github/release-body.md
            echo
            echo "## Изменения"
            echo
            git log --no-merges --pretty='- %s' "${PREV:+$PREV..}HEAD" | grep -v '^- Версия ' || true
            if [ -n "$PREV" ]; then
              echo
              echo "**Полный список:** $REPO/compare/$PREV...v$VERSION"
            fi
          } > release-body.rendered.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Hexapod v${{ needs.prepare.outputs.version }}
          files: dist/*
          body_path: release-body.rendered.md
